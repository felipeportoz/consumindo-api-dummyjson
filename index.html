<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Atividade Layout - Entrega</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    
    <header>
      <h1>DummyJSON Store</h1>
      <nav>
        <input id="campoBusca" type="text" placeholder="Digite um produto..." />
        <button id="btnBuscar">Buscar</button>
      </nav>
    </header>

    <section>
      <h2>Resultado</h2>
    </section>

    <main>
      <div id="bloco-img">
        <img id="imagemProduto" src="" alt="Produto" />
      </div>

      <div id="info-produto">
        <p id="tituloProduto">Nome</p>
        <p id="precoProduto">Preço</p>
        <p id="categoriaProduto">Categoria</p>
        <p id="descricaoProduto">Descrição</p>

        <div class="botoes-nav">
          <button id="btnAnterior">Anterior</button>
          <button id="btnProximo">Próximo</button>
        </div>
      </div>
    </main>

  </body>
</html>
